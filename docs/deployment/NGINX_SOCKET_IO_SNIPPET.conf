# Add this block inside the HTTPS server block for dent-ix.app before location /.
# It proxies the permanent Socket.IO/WebSocket connection to the standalone PM2 socket process.

location /socket.io/ {
    proxy_pass http://127.0.0.1:4001/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_cache_bypass $http_upgrade;
}
